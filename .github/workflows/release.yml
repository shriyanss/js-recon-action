name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.1)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    # PUBLISH_PAT (owned by js-recon-bot) lives in this environment. Using it to
    # create the release means the release is authored by js-recon-bot and is
    # published to the GitHub Marketplace (the default GITHUB_TOKEN / github-actions
    # bot cannot publish to the Marketplace).
    environment: publish-marketplace
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          token: ${{ secrets.PUBLISH_PAT }}

      - name: Validate version matches version.txt and CHANGELOG.md
        run: |
          VERSION="${{ inputs.version }}"
          VERSION_TXT=$(cat version.txt | tr -d '[:space:]')
          CHANGELOG_VERSION=$(grep -E "^## [0-9]+\.[0-9]+\.[0-9]+" CHANGELOG.md | head -n 1 | sed -E 's/^## ([0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?).*/\1/')
          if [[ "$VERSION" != "$VERSION_TXT" ]]; then
            echo "Input version '${VERSION}' does not match version.txt '${VERSION_TXT}'"
            exit 1
          fi
          if [[ "$VERSION" != "$CHANGELOG_VERSION" ]]; then
            echo "Input version '${VERSION}' does not match CHANGELOG.md top version '${CHANGELOG_VERSION}'"
            exit 1
          fi
          echo "[✓] Version ${VERSION} is consistent."

      - name: Extract changelog notes for this version
        run: |
          VERSION="${{ inputs.version }}"
          # Write to a file and pass via --notes-file so markdown (backticks, etc.)
          # is preserved verbatim instead of being interpreted by the shell.
          awk "/^## ${VERSION}([^0-9.]|$)/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > release-notes.md
          echo "----- release notes -----"
          cat release-notes.md

      - name: Create GitHub release (publishes to Marketplace)
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_PAT }}
        run: |
          VERSION="${{ inputs.version }}"
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --target main \
            --latest \
            --notes-file release-notes.md

      - name: Update major-version alias tags
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_PAT }}
        run: |
          VERSION="${{ inputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          git config user.name "js-recon-bot"
          git config user.email "js-recon-bot@users.noreply.github.com"
          git tag -f "v${MAJOR}"
          git tag -f "v${MINOR}"
          git push origin "v${MAJOR}" --force
          git push origin "v${MINOR}" --force
