name: CI

on:
  push:
    branches-ignore:
      - main

jobs:
  version_check:
    if: |
      !startsWith(github.event.head_commit.message, 'chore: prettify code')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check version consistency
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[i] Checking version consistency between version.txt and CHANGELOG.md"
          VERSION_TXT=$(cat version.txt | tr -d '[:space:]')
          CHANGELOG_VERSION=$(grep -E "^## [0-9]+\.[0-9]+\.[0-9]+" CHANGELOG.md | head -n 1 | sed -E 's/^## ([0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?).*/\1/')
          if [[ "$VERSION_TXT" != "$CHANGELOG_VERSION" ]]; then
            echo "Version mismatch: version.txt=${VERSION_TXT}, CHANGELOG.md=${CHANGELOG_VERSION}"
            exit 1
          fi
          echo "[✓] Version matches: ${VERSION_TXT}"
          echo "[i] Checking if this version already exists on GitHub..."
          if gh release view "v${VERSION_TXT}" >/dev/null 2>&1; then
            echo "Release v${VERSION_TXT} already exists on GitHub."
            exit 1
          fi
          echo "[✓] Version v${VERSION_TXT} not yet released."

  prettier:
    runs-on: ubuntu-latest
    needs: version_check
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install Prettier
        run: npm install -g prettier

      - name: Run Prettier
        run: prettier --write .

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: prettify code" || echo "No changes to commit"
          git push

  unit_test:
    runs-on: ubuntu-latest
    needs: prettier
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Run unit tests
        run: npm test

  build_docker:
    runs-on: ubuntu-latest
    needs: unit_test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - name: Build Docker image
        run: docker build -t shriyanss/js-recon-action .

  smoke_test:
    runs-on: ubuntu-latest
    needs: build_docker
    timeout-minutes: 45

    steps:
      - name: Checkout js-recon-action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - name: Checkout js-recon-labs
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: shriyanss/js-recon-labs
          path: js-recon-labs

      - name: Checkout js-recon-rules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: shriyanss/js-recon-rules
          path: js-recon-rules

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: js-recon-labs/next_js/vuln-all-rules/package-lock.json

      - name: Build Docker image
        run: docker build -t shriyanss/js-recon-action .

      - name: Install lab app dependencies
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: npm ci

      - name: Build lab app
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: npm run build

      - name: Start lab app
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: npm start &

      - name: Wait for lab app to be ready
        run: |
          echo "Waiting for lab app on port 3001..."
          n=0
          until curl -sf http://localhost:3001 > /dev/null; do
            n=$((n+1))
            [ $n -ge 30 ] && echo "Timed out waiting for lab app" && exit 1
            sleep 2
          done
          echo "Lab app is ready."

      - name: Run js-recon-action against lab app
        run: |
          docker run --name jsr-action-smoke \
            --network host \
            -v "$(pwd)/js-recon-rules:/home/pptruser/js-recon-rules" \
            -e INPUT_URL=http://localhost:3001 \
            -e INPUT_START_CMD="" \
            -e INPUT_WORKING_DIRECTORY=. \
            -e INPUT_VERSION=latest \
            -e INPUT_BREAK_ON_MAP_FILES=false \
            -e INPUT_BREAK_ON_VULNERABILITIES=false \
            -e INPUT_VULNERABILITY_SEVERITY=high \
            -e INPUT_OUTPUT_DIR=js-recon-output \
            -e GITHUB_OUTPUT=/tmp/github-output \
            shriyanss/js-recon-action || true
          mkdir -p output
          docker cp jsr-action-smoke:/home/pptruser/js-recon-output/. ./output/ 2>/dev/null || true
          docker rm jsr-action-smoke

      - name: Assert output files exist
        run: |
          echo "Checking output directory..."
          ls -la output/ || (echo "No output directory" && exit 1)
          ANALYZE=$(find output -name "analyze.json" | head -1)
          REPORT=$(find output -name "report.html" | head -1)
          if [ -z "${ANALYZE}" ]; then
            echo "ERROR: analyze.json not found in output"
            exit 1
          fi
          if [ -z "${REPORT}" ]; then
            echo "ERROR: report.html not found in output"
            exit 1
          fi
          echo "[✓] analyze.json found: ${ANALYZE}"
          echo "[✓] report.html found: ${REPORT}"
          COUNT=$(node -e "const f=JSON.parse(require('fs').readFileSync('${ANALYZE}')); console.log(f.length)")
          echo "[✓] Findings count: ${COUNT}"

      - name: Upload output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output
          path: output/
          if-no-files-found: ignore
